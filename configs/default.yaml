project:
  name: fire-external-baseline-reproduction
  output_dir: outputs
  random_seed: 7
  reproduction_label: E-KELL-style paper-faithful pipeline-level reimplementation

paths:
  corpus_dir: data/corpus
  scenario_file: data/scenarios/scenario_matrix_v2.json

llm:
  provider: heuristic
  model: local-deterministic-heuristic-smoke-test
  temperature: 0.0
  max_tokens: 1200

scenario_parser:
  use_llm: false

retrieval:
  top_k: 5
  top_k_entities: 8
  top_k_triples: 20
  top_k_relations: 10
  top_k_evidence: 6
  entity_min_score: 0.08
  max_context_chars: 8000

normalization:
  infer_structured_safety_fields: true


graphrag_adapters:
  strict_external_package: false
