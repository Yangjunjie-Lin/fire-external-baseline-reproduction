project:
  name: fire-external-baseline-reproduction
  output_dir: outputs
  random_seed: 7

paths:
  corpus_dir: data/corpus
  scenario_file: data/scenarios/scenario_matrix_v2.json

llm:
  provider: heuristic
  model: local-deterministic-baseline
  temperature: 0.0
  max_tokens: 1200

retrieval:
  top_k: 5
  max_context_chars: 6000

normalization:
  infer_structured_safety_fields: true
