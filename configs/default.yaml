project:
  name: fire-external-baseline-reproduction
  output_dir: outputs
  random_seed: 7
  reproduction_label: E-KELL-style paper-faithful pipeline-level reimplementation, not official E-KELL reproduction.

paths:
  corpus_dir: data/corpus
  scenario_file: data/scenarios/scenario_matrix_v2.json

llm:
  provider: heuristic
  model: local-deterministic-heuristic-smoke-test
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1200
  seed: 7
  timeout_sec: 60
  max_retries: 2

scenario_parser:
  use_llm: false

retrieval:
  top_k: 5
  top_k_entities: 8
  top_k_triples: 20
  top_k_relations: 10
  top_k_evidence: 6
  entity_min_score: 0.08
  max_context_chars: 8000
  max_chunk_chars: 1000

dense_rag:
  backend: smoke_hash_embedding
  model_name: smoke-hash-embedding
  model_version: v0-smoke
  dim: 64
  reuse_index: true
  index_path: outputs/dense_index_smoke.json

hybrid_rag:
  top_k: 5
  rrf_k: 60
  lexical_weight: 1.0
  dense_weight: 1.0
  candidate_pool: 20

ekell_style:
  # Full FOL/vector pipeline uses paper-fidelity stepwise templates.
  # Legacy BM25 scaffold still reads stage1/2/3 from configs/prompts when used.
  prompt_dir: configs/prompts/paper_fidelity
  dense_entity_retrieval: false
  hybrid_subgraph_ranking: false
  reranker: false
  self_consistency: false
  structured_verification: false

normalization:
  # Must stay false for paper/interop fairness. Do not invent safety fields.
  infer_structured_safety_fields: false

paper_final: false
require_bundle_checksum: false

graphrag_adapters:
  strict_external_package: false
