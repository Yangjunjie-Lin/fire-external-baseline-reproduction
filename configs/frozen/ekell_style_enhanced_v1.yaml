# Frozen E-KELL-style ENHANCED config. Separate method_id from faithful.
# Must NOT be reported as paper-faithful / official E-KELL reproduction.
method_id: ekell_style_enhanced
freeze_id: ekell_style_enhanced_v1
split_policy: tuned_on_dev_only_test_frozen
reproduction_class: enhanced
official_reproduction: false
scenario_parser:
  use_llm: true
retrieval:
  top_k: 5
  top_k_entities: 12
  top_k_triples: 30
  top_k_relations: 12
  top_k_evidence: 8
  entity_min_score: 0.05
  max_context_chars: 10000
ekell_style:
  prompt_dir: configs/prompts
  dense_entity_retrieval: true
  hybrid_subgraph_ranking: true
  reranker: false
  self_consistency: false
  structured_verification: false
llm:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1400
  seed: 7
normalization:
  infer_structured_safety_fields: false
track_eligibility:
  A1_text_only: true
  A2_text_corpus: true
  A3_text_corpus_dynamic: false
note: "For dynamic-state Track A3, create ekell_style_enhanced_state_aware separately; do not relabel as faithful."
