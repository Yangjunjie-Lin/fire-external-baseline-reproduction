# Audited BM25 repair config. The v1 config remains immutable for lineage.
method_id: bm25_rag
freeze_id: bm25_rag_real_v2
freeze_status: frozen
split_policy: repair_language_interoperability_without_gold_access
retrieval:
  top_k: 5
  max_chunk_chars: 1000
  max_context_chars: 8000
  tokenizer_version: deterministic_bilingual_lexical_v2
  k1: 1.5
  b: 0.75
  minimum_score: 0.0
llm:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1200
  seed: 7
normalization:
  infer_structured_safety_fields: false
repair_constraints:
  pure_lexical_bm25: true
  dense_embedding_used: false
  llm_query_rewriting_used: false
  evaluator_gold_used: false
  hardcoded_case_mapping_used: false
  zero_score_fallback_used: false
