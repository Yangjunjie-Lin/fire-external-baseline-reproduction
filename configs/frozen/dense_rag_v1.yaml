# Frozen Dense RAG config.
# NOTE: smoke_hash_embedding is NOT a real embedding model. Formal dense leaderboard
# requires a real embedding model + index checksum recorded at run time.
method_id: dense_rag
freeze_id: dense_rag_v1
split_policy: tuned_on_dev_only_test_frozen
retrieval:
  top_k: 5
dense_rag:
  backend: smoke_hash_embedding
  model_name: smoke-hash-embedding
  model_version: v0-smoke
  dim: 64
  reuse_index: true
  index_path: outputs/dense_index_smoke.json
llm:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1200
  seed: 7
normalization:
  infer_structured_safety_fields: false
formal_leaderboard_ready: false
blocker: "Replace smoke_hash_embedding with a real embedding model before paper dense runs."
