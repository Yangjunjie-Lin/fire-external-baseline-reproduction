# Deterministic heuristic smoke config — NEVER set paper_final=true with this file.
paper_final: false
llm:
  provider: heuristic
  model: local-deterministic-heuristic-smoke-test
  temperature: 0.0
  top_p: 1.0
  max_tokens: 1200
  seed: 7

# Stable repository-relative identity used only by offline freeze/provenance tests.
# Real and Formal E-KELL runs must override this with a persisted validated index.
ekell_vector:
  index_path: outputs/indexes/ekell/smoke/

normalization:
  infer_structured_safety_fields: false
