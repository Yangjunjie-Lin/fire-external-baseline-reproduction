method: ekell_style
scenario_parser:
  use_llm: true
retrieval:
  top_k_entities: 10
  top_k_triples: 24
  top_k_relations: 10
  top_k_evidence: 8
  max_context_chars: 10000
ekell_style:
  prompt_dir: configs/prompts/paper_fidelity
prompt_chain:
  stages:
    - situation_understanding
    - kg_grounded_decision_reasoning
    - final_emergency_response
constraints:
  no_safe_modules: true
  no_safety_checker: true
  no_hitl_gate: true
  structured_safety_fields: inferred_from_text
