name: baseline-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e .
          pip install -r requirements.txt
          pip install jsonschema>=4.0
      - name: Compileall
        run: python -m compileall -q src scripts tests
      - name: Pytest
        run: python -m pytest -q
      - name: Independence + faithful dependency
        run: |
          python -m pytest -q tests/test_no_fire_agent_demo_import.py tests/test_ekell_faithful_dependency_audit.py
      - name: FOL / vector / neighborhood / integrity
        run: |
          python -m pytest -q \
            tests/test_fol_executor.py \
            tests/test_ekell_vector_retrieval.py \
            tests/test_neighborhood_expander.py \
            tests/test_bundle_integrity.py \
            tests/test_evidence_mapping.py \
            tests/test_per_case_usage.py \
            tests/test_ekell_full_pipeline_smoke.py
      - name: Fixture corpus validation (strict)
        run: |
          python scripts/validate_data.py --data tests/fixtures/minimal_ekell_corpus || python -c "from external_baselines.ekell_style.kg_loader import audit_corpus; a=audit_corpus('tests/fixtures/minimal_ekell_corpus'); assert a['triple_count']>=1; print(a)"
      - name: Deterministic smoke generate (main-table controlled)
        run: |
          python scripts/generate_predictions.py \
            --methods direct_llm,bm25_rag,ekell_style_controlled_shared_llm \
            --config configs/deterministic_heuristic_smoke.yaml \
            --limit 1 \
            --output outputs/ci_predictions.jsonl \
            --manifest outputs/ci_manifest.json
