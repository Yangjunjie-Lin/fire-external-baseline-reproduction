name: baseline-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Compileall
        run: python -m compileall -q src scripts tests
      - name: Ruff
        run: ruff check src scripts tests
      - name: Pytest
        run: python -m pytest -q
      - name: Repository hygiene
        run: python scripts/check_repository_hygiene.py

  readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Targeted readiness and config tests
        run: |
          python -m pytest -q \
            tests/test_release_readiness.py \
            tests/test_formal_config_validator.py \
            tests/test_model_authority.py \
            tests/test_experiment_manifest.py
      - name: Targeted formal hardening tests
        run: |
          python -m pytest -q \
            tests/test_external_schema_validation.py \
            tests/test_formal_config_validator.py \
            tests/test_method_runtime.py \
            tests/test_formal_compliance.py \
            -k "finite or nonempty_string or remote_ref or runtime_cleanup or lightweight"
      - name: Targeted schema authority tests
        run: |
          python -m pytest -q \
            tests/test_external_schema_validation.py \
            tests/test_formal_compliance.py \
            tests/test_formal_enforcement_and_freeze.py \
            tests/test_experiment_manifest.py \
            tests/test_formal_config_validator.py \
            -k "bundle_schema or schema_authority or registry or local_snapshot or manifest_null"
      - name: Targeted formal identity and freeze tests
        run: |
          python -m pytest -q \
            tests/test_bundle_integrity.py \
            tests/test_formal_compliance.py \
            tests/test_formal_enforcement_and_freeze.py \
            tests/test_method_set_and_freeze.py \
            tests/test_formal_config_validator.py \
            tests/test_external_schema_validation.py \
            -k "official_manifest or method_entry_order or disabled_enhanced or enabled_enhanced or freeze_candidate or complete_freeze or primary_filename or primary_schema_name or self_ref or input_cases_provenance or strict_jsonl or case_id"
      - name: Targeted freeze integrity hardening tests
        run: |
          python -m pytest -q \
            tests/test_bundle_integrity.py \
            tests/test_dense_real_index.py \
            tests/test_ekell_index_persistence.py \
            tests/test_formal_enforcement_and_freeze.py \
            tests/test_method_set_and_freeze.py \
            tests/test_formal_compliance.py \
            -k "aggregate_checksum or producer_consumer or consumer_hash or freeze_integrity or tampered_embeddings or index_manifest_sha256 or freeze_candidate_status or temp_cleanup or original_line or case_id_whitespace or control_character"
      - name: Targeted normalization and frozen-live identity tests
        run: |
          python -m pytest -q \
            tests/test_dense_real_index.py \
            tests/test_ekell_index_persistence.py \
            tests/test_formal_enforcement_and_freeze.py \
            tests/test_formal_compliance.py \
            tests/test_method_set_and_freeze.py \
            -k "normalize_embeddings or frozen_live or replaced_dense or replaced_ekell or non_finite or unit_norm or zero_vector or complete_freeze_requires or aggregate_mismatch_fails_before or runtime_index or after_preflight"
      - name: Targeted official lifecycle hard-gate tests
        run: |
          python -m pytest -q \
            tests/test_comparison_index_builder.py \
            tests/test_official_formal_lifecycle.py \
            tests/test_formal_enforcement_and_freeze.py \
            tests/test_formal_compliance.py \
            tests/test_ekell_index_persistence.py \
            tests/test_path_resolution.py \
            -k "validate_only or exit_code or prompt_bundle or custom_prompt or strict_kg or non_object or original_line or deterministic_path or cwd_independent or official_lifecycle"
      - name: Formal config validator (template example)
        run: |
          python scripts/validate_formal_config.py \
            --validation-stage template \
            --config configs/experiments/controlled_main_table_v1.yaml.example
      - name: E-KELL fidelity audit
        run: python scripts/audit/audit_ekell_fidelity.py
      - name: Deterministic smoke generate
        run: |
          python scripts/generate_predictions.py \
            --methods direct_llm,bm25_rag,ekell_style_controlled_shared_llm \
            --config configs/smoke/deterministic_heuristic.yaml \
            --limit 1 \
            --output outputs/ci_predictions.jsonl \
            --manifest outputs/ci_manifest.json
      - name: Repository hygiene after smoke
        run: python scripts/check_repository_hygiene.py
      - name: Package build
        run: python -m build
      - name: Artifact packaging dry-run
        run: python scripts/package_reproducibility_artifact.py --dry-run
      - name: Release readiness audit
        run: python scripts/audit_release_readiness.py
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-predictions
          path: outputs/ci_predictions.jsonl
          if-no-files-found: warn

  core-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify core package runtime dependencies
        run: |
          python -m pip install -U pip
          python -m pip install .
          python - <<'PY'
          import external_baselines, jsonschema, yaml
          from external_baselines.interop.schema import validate_against_jsonschema, validate_schema_draft202012

          schema = {
              "$schema": "https://json-schema.org/draft/2020-12/schema",
              "$id": "urn:test:primary",
              "$defs": {"record": {"type": "object"}},
              "$ref": "#/$defs/record",
          }
          assert validate_schema_draft202012(schema, primary_schema_name="prediction_schema.json") == []
          assert validate_against_jsonschema({}, schema=schema, primary_schema_name="prediction_schema.json") == []
          PY
