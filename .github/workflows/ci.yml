name: baseline-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e .
          pip install -r requirements.txt
      - name: Compileall
        run: python -m compileall -q src scripts tests
      - name: Pytest
        run: python -m pytest -q
      - name: Independence scan
        run: python -m pytest -q tests/test_no_fire_agent_demo_import.py
      - name: Schema / gold isolation
        run: python -m pytest -q tests/test_canonical_schema.py tests/test_gold_isolation.py
      - name: Data validation smoke
        run: python scripts/validate_data.py || true
      - name: Deterministic smoke generate
        run: |
          python scripts/generate_predictions.py \
            --methods direct_llm,bm25_rag,ekell_style_faithful \
            --config configs/deterministic_heuristic_smoke.yaml \
            --limit 1 \
            --output outputs/ci_predictions.jsonl \
            --manifest outputs/ci_manifest.json
